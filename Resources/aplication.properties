Acessando o Localhost e H2 no Spring Boot
1. Configurar o application.properties
Você precisa ter essas configurações no seu arquivo:
properties# Porta da aplicação (padrão já é 8080)
server.port=8080

# Habilitar o console do H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuração do banco
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Para ver o SQL no console
spring.jpa.show-sql=true
